{% extends "base.html" %} {% block title %}Generate{% endblock %} {% block
content %}
<h1 class="page-title">Generate Synthetic Data</h1>

<div class="glass">
  <form method="POST" action="{{ url_for('generate') }}">
    <div class="form-grid">
      <div class="form-group">
        <label for="model_type">Model Type</label>
        <select id="model_type" name="model_type">
          <option value="CTGAN">CT-GAN</option>
          <option value="TVAE">TVAE</option>
        </select>
      </div>

      <div class="form-group">
        <label for="n_samples">Number of Samples</label>
        <input
          type="number"
          id="n_samples"
          name="n_samples"
          value="1000"
          min="100"
          max="100000"
        />
      </div>

      <div class="form-group">
        <label for="epochs">Epochs</label>
        <input
          type="number"
          id="epochs"
          name="epochs"
          value="300"
          min="1"
          max="2000"
        />
      </div>

      <div class="form-group">
        <label for="batch_size">Batch Size</label>
        <select id="batch_size" name="batch_size">
          <option value="500">500</option>
          <option value="1000" selected>1000</option>
          <option value="2000">2000</option>
          <option value="5000">5000</option>
        </select>
      </div>

      <div class="form-group">
        <label for="random_seed">Random Seed</label>
        <input
          type="number"
          id="random_seed"
          name="random_seed"
          value="42"
          min="0"
        />
      </div>

      <div class="form-group">
        <label for="disease">Disease Filter</label>
        <select id="disease" name="disease">
          <option value="">All Diseases</option>
          <option value="diabetes">Diabetes</option>
          <option value="heart">Heart Disease</option>
          <option value="cancer">Cancer</option>
          <option value="respiratory">Respiratory</option>
        </select>
      </div>

      <div class="form-group full-width" style="margin-top: 0.5rem">
        <button type="submit" class="btn btn-primary">Generate Dataset</button>
      </div>
    </div>
  </form>
</div>
{% endblock %}
